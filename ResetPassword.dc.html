<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reimposta Password — Monkey</title>
<meta name="description" content="Reimposta la password del tuo account Monkey.">
<meta name="robots" content="noindex, nofollow">
<script>window.MONKEY_API_URL = 'https://monkey-backend-xb9b.onrender.com/api';</script>
<script src="./support.js"></script>
<script defer src="./cookie-consent.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { margin:0; background:#FFFCF7; }
    * { box-sizing: border-box; }
    a:focus-visible, button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible, [tabindex]:focus-visible {
      outline: 3px solid #FF6F59 !important;
      outline-offset: 2px !important;
    }
  </style>
</helmet>
<div data-screen-label="RecuperoPassword" style="font-family:'Nunito',system-ui,sans-serif;background:#FFFCF7;min-height:100vh;color:#3D2A1B;">

  <!-- HEADER -->
  <div style="position:sticky;top:0;z-index:50;background:rgba(255,252,247,0.96);backdrop-filter:blur(6px);border-bottom:1px solid rgba(61,42,27,0.1);">
    <div style="max-width:1280px;margin:0 auto;padding:14px clamp(20px,5vw,48px);display:flex;align-items:center;justify-content:space-between;gap:20px;">
      <a href="Home.dc.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;flex:none;">
        <img src="assets/monkey-icon.png" alt="Monkey" style="width:40px;height:40px;object-fit:contain;">
        <img src="assets/monkey-wordmark.png" alt="Monkey" style="height:18px;object-fit:contain;">
      </a>
    </div>
  </div>

  <section style="max-width:440px;margin:0 auto;padding:clamp(48px,8vw,80px) 20px clamp(70px,9vw,100px);">

    <!-- LINK NON VALIDO / SCADUTO -->
    <sc-if value="{{ showInvalid }}" hint-placeholder-val="{{ false }}">
      <h1 style="font:800 clamp(24px,3vw,28px) 'Baloo 2',sans-serif;color:#3D2A1B;margin:0 0 10px;text-align:center;">{{ t.invalidTitle }}</h1>
      <p style="font:400 14.5px/1.5 'Nunito',sans-serif;color:#6B4A30;margin:0 0 28px;text-align:center;">{{ t.invalidBody }}</p>
      <a href="Account.dc.html" style="display:block;text-align:center;width:100%;padding:15px;border-radius:999px;border:2px solid #3D2A1B;background:#FF6F59;color:#fff;font:700 15px 'Baloo 2',sans-serif;text-decoration:none;">{{ t.backToAccount }}</a>
    </sc-if>

    <!-- FORM NUOVA PASSWORD -->
    <sc-if value="{{ showForm }}" hint-placeholder-val="{{ false }}">
      <h1 style="font:800 clamp(24px,3vw,28px) 'Baloo 2',sans-serif;color:#3D2A1B;margin:0 0 10px;text-align:center;">{{ t.formTitle }}</h1>
      <p style="font:400 14.5px/1.5 'Nunito',sans-serif;color:#6B4A30;margin:0 0 28px;text-align:center;">{{ t.formSubtitle }}</p>

      <sc-if value="{{ errorMessage }}" hint-placeholder-val="{{ false }}">
        <div style="background:#FFE7E1;color:#C0402C;font:600 13px 'Nunito',sans-serif;padding:12px 16px;border-radius:14px;margin-bottom:18px;">{{ errorMessage }}</div>
      </sc-if>

      <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:16px;">
        <label style="font:700 12.5px 'Nunito',sans-serif;color:#6B4A30;">{{ t.newPasswordLabel }}</label>
        <input value="{{ passwordValue }}" onChange="{{ onPasswordChange }}" type="password" placeholder="••••••••" style="padding:13px 16px;border-radius:14px;border:1.5px solid rgba(61,42,27,0.15);font:500 14px 'Nunito',sans-serif;color:#3D2A1B;outline:none;">
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:24px;">
        <label style="font:700 12.5px 'Nunito',sans-serif;color:#6B4A30;">{{ t.confirmPasswordLabel }}</label>
        <input value="{{ confirmValue }}" onChange="{{ onConfirmChange }}" type="password" placeholder="••••••••" style="padding:13px 16px;border-radius:14px;border:1.5px solid rgba(61,42,27,0.15);font:500 14px 'Nunito',sans-serif;color:#3D2A1B;outline:none;">
      </div>

      <button onClick="{{ onSubmit }}" style="width:100%;padding:15px;border-radius:999px;border:2px solid #3D2A1B;background:#FF6F59;color:#fff;font:700 15px 'Baloo 2',sans-serif;cursor:pointer;">{{ t.submitLabel }}</button>
    </sc-if>

    <!-- FATTO -->
    <sc-if value="{{ showDone }}" hint-placeholder-val="{{ false }}">
      <h1 style="font:800 clamp(24px,3vw,28px) 'Baloo 2',sans-serif;color:#3D2A1B;margin:0 0 10px;text-align:center;">{{ t.doneTitle }}</h1>
      <p style="font:400 14.5px/1.5 'Nunito',sans-serif;color:#6B4A30;margin:0 0 28px;text-align:center;">{{ t.doneBody }}</p>
      <a href="Account.dc.html" style="display:block;text-align:center;width:100%;padding:15px;border-radius:999px;border:2px solid #3D2A1B;background:#FF6F59;color:#fff;font:700 15px 'Baloo 2',sans-serif;text-decoration:none;">{{ t.goToLogin }}</a>
    </sc-if>

  </section>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
const STRINGS = {
  it: {
    invalidTitle: 'Link non valido o scaduto',
    invalidBody: 'Questo link per reimpostare la password non è più valido. Richiedine uno nuovo dalla pagina di accesso.',
    backToAccount: 'Torna alla pagina di accesso',
    formTitle: 'Imposta una nuova password',
    formSubtitle: 'Scegli una password di almeno 6 caratteri.',
    newPasswordLabel: 'Nuova password', confirmPasswordLabel: 'Conferma nuova password',
    submitLabel: 'Salva la nuova password',
    errorMismatch: 'Le due password non coincidono.',
    errorShort: 'La password deve avere almeno 6 caratteri.',
    errorGeneric: 'Qualcosa è andato storto. Il link potrebbe essere scaduto: riprova a richiederne uno nuovo.',
    doneTitle: 'Password aggiornata',
    doneBody: 'La tua password è stata cambiata con successo. Ora puoi accedere con la nuova password.',
    goToLogin: 'Vai al login'
  },
  en: {
    invalidTitle: 'Invalid or expired link',
    invalidBody: 'This password reset link is no longer valid. Request a new one from the sign-in page.',
    backToAccount: 'Back to sign in',
    formTitle: 'Set a new password',
    formSubtitle: 'Choose a password with at least 6 characters.',
    newPasswordLabel: 'New password', confirmPasswordLabel: 'Confirm new password',
    submitLabel: 'Save new password',
    errorMismatch: 'The two passwords do not match.',
    errorShort: 'The password must be at least 6 characters long.',
    errorGeneric: 'Something went wrong. The link may have expired: try requesting a new one.',
    doneTitle: 'Password updated',
    doneBody: 'Your password has been changed successfully. You can now sign in with your new password.',
    goToLogin: 'Go to sign in'
  }
};

function detectInitialLang() {
  try {
    const nav = (navigator.language || 'it').toLowerCase();
    if (nav.startsWith('en')) return 'en';
  } catch (e) {}
  return 'it';
}

// Supabase manda l'utente qui con un link tipo:
//   ResetPassword.dc.html#access_token=...&type=recovery&refresh_token=...
// I parametri sono nel FRAGMENT (dopo #), non nella query string, per non
// finire nei log dei server. Li leggiamo con URLSearchParams sul valore
// dopo il primo carattere '#'.
function parseRecoveryToken() {
  try {
    const hash = window.location.hash || '';
    const params = new URLSearchParams(hash.startsWith('#') ? hash.slice(1) : hash);
    const type = params.get('type');
    const accessToken = params.get('access_token');
    if (type === 'recovery' && accessToken) return accessToken;
  } catch (e) {}
  return null;
}

class Component extends DCLogic {
  state = {
    lang: detectInitialLang(),
    token: null,
    password: '',
    confirm: '',
    status: 'idle', // idle | sending | done
    errorKey: null
  };

  componentDidMount() {
    const token = parseRecoveryToken();
    this.setState({ token });
    import('./data.js').then(mod => { this.dataApi = mod; });
  }

  onPasswordChange = (e) => this.setState({ password: e.target.value });
  onConfirmChange = (e) => this.setState({ confirm: e.target.value });

  onSubmit = () => {
    if (!this.dataApi || !this.state.token) return;
    const { password, confirm } = this.state;
    if (password.length < 6) { this.setState({ errorKey: 'errorShort' }); return; }
    if (password !== confirm) { this.setState({ errorKey: 'errorMismatch' }); return; }
    this.setState({ status: 'sending', errorKey: null });
    this.dataApi.confirmPasswordReset(this.state.token, password)
      .then(() => this.setState({ status: 'done' }))
      .catch(() => this.setState({ status: 'idle', errorKey: 'errorGeneric' }));
  };

  renderVals() {
    const lang = this.state.lang;
    const t = STRINGS[lang];
    const hasToken = !!this.state.token;
    const isDone = this.state.status === 'done';

    return {
      lang, t,
      showInvalid: !hasToken,
      showForm: hasToken && !isDone,
      showDone: hasToken && isDone,
      passwordValue: this.state.password,
      confirmValue: this.state.confirm,
      onPasswordChange: this.onPasswordChange,
      onConfirmChange: this.onConfirmChange,
      onSubmit: this.onSubmit,
      errorMessage: this.state.errorKey ? t[this.state.errorKey] : null
    };
  }
}
</script>
</body>
</html>
